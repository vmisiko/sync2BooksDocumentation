<svg width="240" height="64" viewBox="0 0 240 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="s2b-logo-gradient-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#93C5FD" />
    </linearGradient>
  </defs>

  <!-- Icon (from Sync2BooksLogo, viewBox 0 0 64 64) -->
  <!-- Left loop forming "S" -->
  <path
    d="M 24 20 C 16 20 12 26 12 32 C 12 38 16 44 24 44 C 28 44 30 42 32 40"
    stroke="url(#s2b-logo-gradient-dark)"
    stroke-width="4"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Right loop with "2" element -->
  <path
    d="M 32 24 C 34 22 36 20 40 20 C 48 20 52 26 52 32 C 52 38 48 44 40 44 C 36 44 34 42 32 40"
    stroke="url(#s2b-logo-gradient-dark)"
    stroke-width="4"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Center connection - the "2" -->
  <circle cx="32" cy="26" r="3" fill="#93C5FD" />
  <path
    d="M 32 29 L 32 35 L 36 35"
    stroke="#93C5FD"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Small book accent at bottom -->
  <rect x="29" y="48" width="6" height="8" rx="1" fill="#93C5FD" opacity="0.3" />
  <line x1="32" y1="48" x2="32" y2="56" stroke="#60A5FA" stroke-width="1.5" opacity="0.5" />

  <!-- Wordmark -->
  <text x="72" y="34" fill="#FFFFFF" font-size="26" font-weight="600"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    letter-spacing="-0.5" dominant-baseline="middle">Sync2Books</text>
</svg>
